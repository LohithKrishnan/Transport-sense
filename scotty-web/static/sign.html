<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TransportSense — Sign In</title>
<link rel="icon" type="image/png" href="img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ── FIREBASE SDK ── Replace with your own Firebase config ── -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         signInWithPopup, GoogleAuthProvider, onAuthStateChanged,
         sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7Z-RI4UOeyYxeWv4VVQQvCZ9kGdaqevM",
  authDomain: "transport-emission.firebaseapp.com",
  projectId: "transport-emission",
  storageBucket: "transport-emission.firebasestorage.app",
  messagingSenderId: "375640972672",
  appId: "1:375640972672:web:32237743f3307352b1b565"
};

const app           = initializeApp(firebaseConfig);
const auth          = getAuth(app);
const googleProvider = new GoogleAuthProvider();

if (window.location.search.includes('logout=true')) {
  signOut(auth).then(() => {
    history.replaceState(null, '', 'sign.html');
  });
}

onAuthStateChanged(auth, user => {
  if (user && !window.location.search.includes('logout=true')) {
    window.location.href = 'dashboard.html';
  }
});

window.handleSignIn = async () => {
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  setLoading('signin-btn', true);
  clearError('signin-error');
  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'dashboard.html';
  } catch (e) {
    showError('signin-error', friendlyError(e.code));
  }
  setLoading('signin-btn', false);
};

window.handleSignUp = async () => {
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm  = document.getElementById('signup-confirm').value;
  clearError('signup-error');
  if (password !== confirm) { showError('signup-error', 'Passwords do not match.'); return; }
  if (password.length < 6)  { showError('signup-error', 'Password must be at least 6 characters.'); return; }
  setLoading('signup-btn', true);
  try {
    await createUserWithEmailAndPassword(auth, email, password);
    window.location.href = 'dashboard.html';
  } catch (e) {
    showError('signup-error', friendlyError(e.code));
  }
  setLoading('signup-btn', false);
};

window.handleGoogle = async () => {
  clearError('signin-error'); clearError('signup-error');
  try {
    await signInWithPopup(auth, googleProvider);
    window.location.href = 'dashboard.html';
  } catch (e) {
    const active = document.querySelector('.auth-tab.active').dataset.tab;
    showError(active + '-error', friendlyError(e.code));
  }
};

window.handleReset = async () => {
  const email = document.getElementById('signin-email').value.trim();
  if (!email) { showError('signin-error', 'Enter your email above first.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showSuccess('signin-error', 'Reset email sent — check your inbox.');
  } catch (e) {
    showError('signin-error', friendlyError(e.code));
  }
};

function friendlyError(code) {
  const map = {
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/too-many-requests':    'Too many attempts. Please try again later.',
    'auth/popup-closed-by-user': 'Sign-in popup was closed.',
    'auth/invalid-credential':   'Invalid email or password.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.color = '#f87171'; el.style.display = 'block';
}
function showSuccess(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.color = '#4ade80'; el.style.display = 'block';
}
function clearError(id) {
  const el = document.getElementById(id);
  el.textContent = ''; el.style.display = 'none';
}
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.auth-tab.active')?.dataset.tab;
  if (active === 'signin') window.handleSignIn();
  if (active === 'signup') window.handleSignUp();
});
</script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06050e;
  --border:rgba(124,58,237,.15);--border2:rgba(124,58,237,.3);--border3:rgba(124,58,237,.45);
  --text:#f0ecff;--text2:#c4b5fd;--text3:#8b7fc7;--text4:#5b4f8a;
  --glass:rgba(124,58,237,.04);--glass2:rgba(124,58,237,.08);--glass3:rgba(124,58,237,.14);
  --good:#4ade80;--bad:#f87171;
  --accent:#7c3aed;--accent2:#a78bfa;
}
html{font-size:14px}
body{
  background:var(--bg);color:var(--text2);
  font-family:'Inter',sans-serif;line-height:1.6;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Particle canvas */
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Glow orbs */
.glow-orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(100px);opacity:.15;z-index:0}
.glow-orb-1{width:500px;height:500px;background:#7c3aed;top:-10%;left:-5%;animation:orbFloat 8s ease-in-out infinite}
.glow-orb-2{width:400px;height:400px;background:#6366f1;bottom:-10%;right:-5%;animation:orbFloat 10s ease-in-out infinite 2s}
.glow-orb-3{width:300px;height:300px;background:#a78bfa;top:40%;left:50%;animation:orbFloat 12s ease-in-out infinite 4s}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── CARD ── */
.auth-card{
  position:relative;z-index:2;
  width:100%;max-width:420px;
  background:rgba(6,5,14,.88);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:2.4rem 2.4rem 2rem;
  backdrop-filter:blur(24px);
  box-shadow:0 12px 50px rgba(124,58,237,.08);
}

/* ── BRAND ── */
.auth-brand{text-align:center;margin-bottom:2rem}
.auth-brand-eyebrow{font-size:9px;letter-spacing:.35em;color:var(--text4);text-transform:uppercase;margin-bottom:.5rem;font-family:'JetBrains Mono'}
.auth-brand-name{font-size:1.7rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
.auth-brand-name span{color:var(--text3)}
.auth-brand-sub{font-size:11px;color:var(--text4);margin-top:.3rem}

/* ── TABS ── */
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:1.8rem;gap:3px}
.auth-tab{
  padding:.5rem;text-align:center;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--text3);
  border-radius:8px;transition:all .15s;
  border:1px solid transparent;
}
.auth-tab:hover{color:var(--text)}
.auth-tab.active{background:var(--glass3);border-color:var(--border2);color:var(--text);font-weight:600}

/* ── PANELS ── */
.auth-panel{display:none}
.auth-panel.active{display:block}

/* ── FORM ── */
.field{margin-bottom:1rem}
.field-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text4);font-family:'JetBrains Mono';margin-bottom:.4rem;display:block}
.field-input{
  width:100%;background:var(--glass2);
  border:1px solid var(--border2);
  color:var(--text);padding:.65rem .9rem;
  font-family:'Inter';font-size:13px;
  border-radius:8px;outline:none;
  transition:all .15s;
}
.field-input:focus{border-color:var(--border3);background:var(--glass3);box-shadow:0 0 0 2px rgba(255,255,255,.05)}
.field-input::placeholder{color:var(--text4)}

/* ── BUTTONS ── */
.btn-primary{
  width:100%;padding:.7rem;
  background:var(--accent);border:none;
  color:#fff;font-family:'Inter';
  font-size:13px;font-weight:700;
  letter-spacing:.04em;border-radius:8px;
  cursor:pointer;transition:all .2s;
  margin-top:.4rem;
}
.btn-primary:hover{background:#6d28d9;transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,58,237,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-google{
  width:100%;padding:.65rem;
  background:var(--glass2);
  border:1px solid var(--border2);
  color:var(--text2);font-family:'Inter';
  font-size:13px;font-weight:500;
  border-radius:8px;cursor:pointer;
  transition:all .15s;margin-top:.6rem;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.btn-google:hover{background:var(--glass3);border-color:var(--border3);color:var(--text)}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:.7rem;margin:.9rem 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:10px;color:var(--text4);font-family:'JetBrains Mono';flex-shrink:0}

/* ── ERROR / SUCCESS ── */
.auth-msg{font-size:11px;margin-top:.5rem;display:none;font-family:'JetBrains Mono';line-height:1.5}

/* ── FORGOT / FOOTER ── */
.auth-forgot{text-align:right;margin-top:-.4rem;margin-bottom:.8rem}
.auth-forgot button{background:none;border:none;color:var(--text4);font-size:11px;cursor:pointer;font-family:'Inter';padding:0;transition:color .15s}
.auth-forgot button:hover{color:var(--text3)}
.auth-footer{text-align:center;margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--border);font-size:11px;color:var(--text4)}
.auth-footer a{color:var(--text3);text-decoration:none;transition:color .15s}
.auth-footer a:hover{color:var(--text)}
</style>
</head>
<body>

<!-- Glow Orbs -->
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>

<!-- Particle Canvas -->
<canvas id="particle-canvas"></canvas>

<div class="auth-card">

  <!-- Brand -->
  <div class="auth-brand">
    <div class="auth-brand-eyebrow">Urban Analytics</div>
    <div class="auth-brand-name">Transport<span>Sense</span></div>
    <div class="auth-brand-sub">Emission Intelligence Platform</div>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <div class="auth-tab active" data-tab="signin" onclick="switchTab('signin')">Sign In</div>
    <div class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- ── SIGN IN PANEL ── -->
  <div class="auth-panel active" id="panel-signin">
    <div class="field">
      <label class="field-label" for="signin-email">Email</label>
      <input class="field-input" id="signin-email" type="text" placeholder="Email or username" autocomplete="username">
    </div>
    <div class="field">
      <label class="field-label" for="signin-password">Password</label>
      <input class="field-input" id="signin-password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="auth-forgot">
      <button onclick="handleReset()">Forgot password?</button>
    </div>
    <div class="auth-msg" id="signin-error"></div>
    <button class="btn-primary" id="signin-btn" data-label="Sign In" onclick="handleSignIn()">Sign In</button>
    <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- ── SIGN UP PANEL ── -->
  <div class="auth-panel" id="panel-signup">
    <div class="field">
      <label class="field-label" for="signup-email">Email</label>
      <input class="field-input" id="signup-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="field-label" for="signup-password">Password</label>
      <input class="field-input" id="signup-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password">
    </div>
    <div class="field">
      <label class="field-label" for="signup-confirm">Confirm Password</label>
      <input class="field-input" id="signup-confirm" type="password" placeholder="Repeat password" autocomplete="new-password">
    </div>
    <div class="auth-msg" id="signup-error"></div>
    <button class="btn-primary" id="signup-btn" data-label="Create Account" onclick="handleSignUp()">Create Account</button>
    <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- Footer -->
  <div class="auth-footer">
    By signing in you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
  </div>

</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
}

/* ── PARTICLE SYSTEM ── */
(function(){
  const canvas=document.getElementById('particle-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[],mouse={x:-9999,y:-9999};
  const COUNT=180,MAG=120,COLOR='#7c3aed',LERP=0.04,PSIZE=2,FIELD=8;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  class P{
    constructor(){this.reset();this.ox=this.x;this.oy=this.y;this.a=Math.random()*Math.PI*2;this.sp=0.3+Math.random()*0.4;this.sz=PSIZE*(0.5+Math.random());this.len=4+Math.random()*6;}
    reset(){this.x=Math.random()*W;this.y=Math.random()*H;}
    update(t){
      this.ox+=Math.cos(this.a)*this.sp*1.2;this.oy+=Math.sin(this.a)*this.sp*1.2;
      this.a+=(Math.random()-0.5)*0.1;
      if(this.ox<-20)this.ox=W+20;if(this.ox>W+20)this.ox=-20;
      if(this.oy<-20)this.oy=H+20;if(this.oy>H+20)this.oy=-20;
      const dx=this.ox-mouse.x,dy=this.oy-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
      let tx=this.ox,ty=this.oy;
      if(d<MAG&&d>0){const f=(1-d/MAG)*FIELD;tx+=(dx/d)*f*12;ty+=(dy/d)*f*12;}
      this.x+=(tx-this.x)*LERP;this.y+=(ty-this.y)*LERP;
      this.sz=PSIZE*(0.5+Math.random())*(0.8+0.2*Math.sin(t*0.003+this.a));
    }
    draw(){
      const vx=this.x-this.ox,vy=this.y-this.oy,sp=Math.sqrt(vx*vx+vy*vy);
      const a=Math.atan2(vy,vx),len=Math.min(this.len+sp*0.5,12);
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(a);
      ctx.beginPath();ctx.roundRect(-len/2,-this.sz/2,len,this.sz,this.sz/2);
      ctx.fillStyle=COLOR;ctx.globalAlpha=0.4+Math.min(sp*0.05,0.5);ctx.fill();ctx.restore();
    }
  }
  for(let i=0;i<COUNT;i++)particles.push(new P());
  function anim(t){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.update(t);p.draw();});requestAnimationFrame(anim);}
  requestAnimationFrame(anim);
  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
})();
</script>
</body>
</html>
